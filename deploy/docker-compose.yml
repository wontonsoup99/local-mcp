# Ollama + agent. From deploy/: docker compose up -d --build
# Pull a model: docker compose exec ollama ollama pull llama3.2
#
# GPU: requires NVIDIA Container Toolkit. On CPU-only hosts, remove the `gpus` line below.
# Ollama port: "11434:11434" exposes the API on all interfaces; use "127.0.0.1:11434:11434" to bind localhost only.

name: ollama-mcp

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    gpus: all
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:8080:8080"

  # Optional: docker compose --profile webui up -d
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    profiles: ["webui"]
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-use-openssl-rand-hex-32}
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      - ollama

volumes:
  ollama:
  open_webui_data:
