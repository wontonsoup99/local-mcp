# Ollama + agent on a VPS. Copy .env from repo root (see .env.example).
# Pull a model after first start: docker compose exec ollama ollama pull llama3.2

name: ollama-mcp

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:8080:8080"

  # Optional web UI for Ollama (+ MCP configured inside Open WebUI). Enable with:
  #   cd deploy && WEBUI_SECRET_KEY="$(openssl rand -hex 32)" docker compose --profile webui up -d
  # Or put WEBUI_SECRET_KEY in deploy/.env (Compose loads .env next to this file for variable substitution).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    profiles: ["webui"]
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      # Required for stable sessions; OAuth-connected MCP tools need this not to reset on restart.
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-use-openssl-rand-hex-32}
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      - ollama

volumes:
  ollama_data:
  open_webui_data:
