# Ollama + agent. From deploy/: docker compose up -d --build
# Pull a model: docker compose exec ollama ollama pull llama3.2
#
# GPU: requires NVIDIA Container Toolkit. On CPU-only hosts, remove the `gpus` line below.
# Ollama port: "11434:11434" exposes the API on all interfaces; use "127.0.0.1:11434:11434" to bind localhost only.

name: ollama-mcp

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    gpus: all
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:8081:8080"

volumes:
  ollama:
